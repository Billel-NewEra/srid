{% extends "base.html" %}
{% block title %}Référentiels - SRID COM{% endblock %}

{% block content %}
<div class="fade-in">
    <div class="mb-6">
        <h1 class="text-2xl font-bold page-title"><i class="fas fa-list text-primary mr-2"></i>Référentiels</h1>
        <p class="text-sm page-subtitle mt-1">Gérez les listes de clients/libellés et remettants/commerciaux utilisées dans la saisie.</p>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">

        <!-- ── Clients / Libellés ── -->
        <div class="card bg-base-100 shadow">
            <div class="card-body p-5">
                <h2 class="card-title text-base mb-4">
                    <i class="fas fa-building text-primary mr-2"></i>Clients / Libellés
                </h2>

                <form hx-post="{{ url_for('api_ref_client_add') }}"
                      hx-target="#clients-list"
                      hx-swap="innerHTML"
                      hx-on::after-request="this.reset(); document.getElementById('filter-clients').value=''"
                      class="flex gap-2 mb-3">
                    <input type="text" name="nom"
                           placeholder="Nouveau client / libellé..."
                           class="input input-bordered input-sm flex-1"
                           required maxlength="200">
                    <button type="submit" class="btn btn-primary btn-sm">
                        <i class="fas fa-plus mr-1"></i>Ajouter
                    </button>
                </form>

                <input type="text" name="search" id="filter-clients"
                       placeholder="Rechercher un client..."
                       class="input input-bordered input-sm w-full mb-3"
                       hx-get="{{ url_for('api_ref_clients_list') }}"
                       hx-trigger="input changed delay:300ms"
                       hx-target="#clients-list"
                       hx-swap="innerHTML">

                <div id="clients-list" class="max-h-[380px] overflow-y-auto"
                     hx-get="{{ url_for('api_ref_clients_list') }}"
                     hx-trigger="load"
                     hx-swap="innerHTML">
                    <div class="flex justify-center py-8">
                        <span class="loading loading-spinner loading-md opacity-40"></span>
                    </div>
                </div>
            </div>
        </div>

        <!-- ── Remettants / Commerciaux ── -->
        <div class="card bg-base-100 shadow">
            <div class="card-body p-5">
                <h2 class="card-title text-base mb-4">
                    <i class="fas fa-user-tie text-secondary mr-2"></i>Remettants / Commerciaux
                </h2>

                <form hx-post="{{ url_for('api_ref_remettant_add') }}"
                      hx-target="#remettants-list"
                      hx-swap="innerHTML"
                      hx-on::after-request="this.reset(); document.getElementById('filter-remettants').value=''"
                      class="flex gap-2 mb-3">
                    <input type="text" name="nom"
                           placeholder="Nouveau remettant / commercial..."
                           class="input input-bordered input-sm flex-1"
                           required maxlength="200">
                    <button type="submit" class="btn btn-secondary btn-sm">
                        <i class="fas fa-plus mr-1"></i>Ajouter
                    </button>
                </form>

                <input type="text" name="search" id="filter-remettants"
                       placeholder="Rechercher un remettant..."
                       class="input input-bordered input-sm w-full mb-3"
                       hx-get="{{ url_for('api_ref_remettants_list') }}"
                       hx-trigger="input changed delay:300ms"
                       hx-target="#remettants-list"
                       hx-swap="innerHTML">

                <div id="remettants-list" class="max-h-[380px] overflow-y-auto"
                     hx-get="{{ url_for('api_ref_remettants_list') }}"
                     hx-trigger="load"
                     hx-swap="innerHTML">
                    <div class="flex justify-center py-8">
                        <span class="loading loading-spinner loading-md opacity-40"></span>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>
{% endblock %}
