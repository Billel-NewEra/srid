{% extends "base.html" %}
{% block title %}Modifier opération - SRID COM{% endblock %}

{% block content %}
<div class="fade-in">
    <div class="flex items-center gap-3 mb-6">
        <a href="{{ url_for('consultation') }}" class="btn btn-ghost btn-sm">
            <i class="fas fa-arrow-left"></i>
        </a>
        <h1 class="text-2xl font-bold"><i class="fas fa-edit text-primary mr-2"></i>Modifier l'opération #{{ operation.id }}</h1>
    </div>

    <div class="card bg-base-100 shadow-xl border border-base-300">
        <div class="card-body">
            <form method="POST" action="{{ url_for('edit_operation', op_id=operation.id) }}" class="space-y-6">

                <div class="divider divider-start text-sm font-semibold opacity-70">
                    <i class="fas fa-tag mr-1"></i> Type d'opération
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                    <div class="form-control">
                        <label class="label"><span class="label-text font-medium">Type *</span></label>
                        <select name="type_operation" class="select select-bordered w-full" required>
                            <option value="Chèque" {% if operation.type_operation == 'Chèque' %}selected{% endif %}>Chèque</option>
                            <option value="Virement" {% if operation.type_operation == 'Virement' %}selected{% endif %}>Virement</option>
                            <option value="Versement" {% if operation.type_operation == 'Versement' %}selected{% endif %}>Versement</option>
                        </select>
                    </div>
                    <div class="form-control">
                        <label class="label"><span class="label-text font-medium">Société *</span></label>
                        <select name="societe" class="select select-bordered w-full" required>
                            <option value="ENT" {% if operation.societe == 'ENT' %}selected{% endif %}>ENT</option>
                            <option value="Genetics" {% if operation.societe == 'Genetics' %}selected{% endif %}>Genetics</option>
                        </select>
                    </div>
                    <div class="form-control">
                        <label class="label"><span class="label-text font-medium">Famille</span></label>
                        <input type="text" name="famille" class="input input-bordered w-full" value="{{ operation.famille or '' }}">
                    </div>
                </div>

                <div class="divider divider-start text-sm font-semibold opacity-70">
                    <i class="fas fa-calendar mr-1"></i> Dates
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                    <div class="form-control">
                        <label class="label"><span class="label-text font-medium">Date opération *</span></label>
                        <input type="date" name="date_operation" class="input input-bordered w-full" value="{{ operation.date_operation.strftime('%Y-%m-%d') if operation.date_operation else '' }}" required>
                    </div>
                    <div class="form-control">
                        <label class="label"><span class="label-text font-medium">Date réception</span></label>
                        <input type="date" name="date_reception" class="input input-bordered w-full" value="{{ operation.date_reception.strftime('%Y-%m-%d') if operation.date_reception else '' }}">
                    </div>
                    <div class="form-control">
                        <label class="label"><span class="label-text font-medium">Report encaissement</span></label>
                        <input type="date" name="date_encaissement" class="input input-bordered w-full" value="{{ operation.date_encaissement.strftime('%Y-%m-%d') if operation.date_encaissement else '' }}">
                    </div>
                    <div class="form-control">
                        <label class="label"><span class="label-text font-medium">Date sortie</span></label>
                        <input type="date" name="date_sortie" class="input input-bordered w-full" value="{{ operation.date_sortie.strftime('%Y-%m-%d') if operation.date_sortie else '' }}">
                    </div>
                </div>

                <div class="divider divider-start text-sm font-semibold opacity-70">
                    <i class="fas fa-user mr-1"></i> Client & Montant
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                    <div class="form-control">
                        <label class="label"><span class="label-text font-medium">Client *</span></label>
                        <input type="text" name="client" class="input input-bordered w-full" value="{{ operation.client }}" required>
                    </div>
                    <div class="form-control">
                        <label class="label"><span class="label-text font-medium">Remettant</span></label>
                        <input type="text" name="remettant" class="input input-bordered w-full" value="{{ operation.remettant or '' }}">
                    </div>
                    <div class="form-control">
                        <label class="label"><span class="label-text font-medium">Montant *</span></label>
                        <input type="number" name="montant" step="0.01" class="input input-bordered w-full" value="{{ operation.montant }}" required>
                    </div>
                </div>

                <div class="divider divider-start text-sm font-semibold opacity-70">
                    <i class="fas fa-university mr-1"></i> Banque & Pièce
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                    <div class="form-control">
                        <label class="label"><span class="label-text font-medium">Banque</span></label>
                        <input type="text" name="banque" class="input input-bordered w-full" value="{{ operation.banque or '' }}">
                    </div>
                    <div class="form-control">
                        <label class="label"><span class="label-text font-medium">N° Pièce</span></label>
                        <input type="text" name="numero_piece" class="input input-bordered w-full" value="{{ operation.numero_piece or '' }}">
                    </div>
                    <div class="form-control">
                        <label class="label"><span class="label-text font-medium">Statut *</span></label>
                        <select name="statut" class="select select-bordered w-full" required>
                            <option value="En attente" {% if operation.statut == 'En attente' %}selected{% endif %}>En attente</option>
                            <option value="Encaissé" {% if operation.statut == 'Encaissé' %}selected{% endif %}>Encaissé</option>
                            <option value="En cours" {% if operation.statut == 'En cours' %}selected{% endif %}>En cours</option>
                            <option value="Rejeté" {% if operation.statut == 'Rejeté' %}selected{% endif %}>Rejeté</option>
                            <option value="Annulé" {% if operation.statut == 'Annulé' %}selected{% endif %}>Annulé</option>
                        </select>
                    </div>
                </div>

                <div class="divider divider-start text-sm font-semibold opacity-70">
                    <i class="fas fa-info-circle mr-1"></i> Détails
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                    <div class="form-control">
                        <label class="label"><span class="label-text font-medium">Type détail</span></label>
                        <select name="type_detail" class="select select-bordered w-full">
                            <option value="">-- Aucun --</option>
                            <option value="Courant" {% if operation.type_detail == 'Courant' %}selected{% endif %}>Courant</option>
                            <option value="Garantie" {% if operation.type_detail == 'Garantie' %}selected{% endif %}>Garantie</option>
                        </select>
                    </div>
                    <div class="form-control flex flex-row items-end gap-4">
                        <label class="label cursor-pointer gap-2">
                            <input type="checkbox" name="entree" class="checkbox checkbox-primary" {% if operation.entree %}checked{% endif %}>
                            <span class="label-text">Entrée</span>
                        </label>
                        <label class="label cursor-pointer gap-2">
                            <input type="checkbox" name="sortie" class="checkbox checkbox-secondary" {% if operation.sortie %}checked{% endif %}>
                            <span class="label-text">Sortie</span>
                        </label>
                    </div>
                </div>
                <div class="form-control">
                    <label class="label"><span class="label-text font-medium">Remarque</span></label>
                    <textarea name="remarque" class="textarea textarea-bordered w-full" rows="3">{{ operation.remarque or '' }}</textarea>
                </div>

                <div class="flex justify-end gap-3 pt-4">
                    <a href="{{ url_for('consultation') }}" class="btn btn-ghost">Annuler</a>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save mr-1"></i> Enregistrer les modifications
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
