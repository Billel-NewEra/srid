<form method="POST" action="{{ url_for('edit_operation', op_id=operation.id) }}"
      hx-post="{{ url_for('edit_operation', op_id=operation.id) }}"
      hx-target="#modal-content"
      class="space-y-4 p-2">
    <h3 class="font-bold text-lg mb-4"><i class="fas fa-edit text-primary mr-2"></i>Modifier #{{ operation.id }}</h3>

    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
        <div class="form-control">
            <label class="label label-text text-xs">Type</label>
            <select name="type_operation" class="select select-bordered select-sm w-full" data-type-operation>
                <option value="Chèque" {% if operation.type_operation == 'Chèque' %}selected{% endif %}>Chèque</option>
                <option value="Virement" {% if operation.type_operation == 'Virement' %}selected{% endif %}>Virement</option>
                <option value="Versement" {% if operation.type_operation == 'Versement' %}selected{% endif %}>Versement</option>
                <option value="Transfer" {% if operation.type_operation == 'Transfer' %}selected{% endif %}>Transfer</option>
                <option value="Autre" {% if operation.type_operation == 'Autre' %}selected{% endif %}>Autre</option>
            </select>
        </div>
        <div class="form-control">
            <label class="label label-text text-xs">Société</label>
            <select name="societe" class="select select-bordered select-sm w-full">
                <option value="SRID" {% if operation.societe == 'SRID' %}selected{% endif %}>SRID</option>
                <option value="Genetics" {% if operation.societe == 'Genetics' %}selected{% endif %}>Genetics</option>
            </select>
        </div>
        <div class="form-control">
            <label class="label label-text text-xs">Type chèque</label>
            <select name="type_cheque" class="select select-bordered select-sm w-full" data-type-cheque>
                <option value="">-- Aucun --</option>
                {% for check_type in check_type_options %}
                <option value="{{ check_type }}" {% if operation.type_detail == check_type %}selected{% endif %}>{{ check_type }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-control hidden" data-date-general-wrap>
            <label class="label label-text text-xs">Date</label>
            <input type="date" name="date_operation" class="input input-bordered input-sm w-full" value="{{ operation.date_operation.strftime('%Y-%m-%d') if operation.date_operation else '' }}" data-date-general>
        </div>
        <div class="form-control hidden" data-date-reception-wrap>
            <label class="label label-text text-xs">Date réception</label>
            <input type="date" name="date_reception" class="input input-bordered input-sm w-full" value="{{ operation.date_reception.strftime('%Y-%m-%d') if operation.date_reception else '' }}" data-date-reception>
        </div>
        <div class="form-control hidden" data-date-sortie-wrap>
            <label class="label label-text text-xs">Date dépôt / virement</label>
            <input type="date" name="date_sortie" class="input input-bordered input-sm w-full" value="{{ operation.date_sortie.strftime('%Y-%m-%d') if operation.date_sortie else '' }}" data-date-sortie>
        </div>
        <div class="form-control hidden" data-date-echeance-wrap>
            <label class="label label-text text-xs">Date échéance</label>
            <input type="date" name="date_echeance" class="input input-bordered input-sm w-full" value="{{ operation.date_encaissement.strftime('%Y-%m-%d') if operation.date_encaissement else '' }}" data-date-echeance>
        </div>
        <div class="form-control">
            <label class="label label-text text-xs">Client</label>
            <input type="text" name="client" class="input input-bordered input-sm w-full" value="{{ operation.client }}" autocomplete="off" required data-client-input-edit>
            <div class="mt-1 hidden max-h-40 overflow-y-auto rounded-lg border border-base-300 bg-base-100 shadow-sm" data-client-list-edit>
                {% for client in client_options %}
                <button type="button" class="block w-full px-3 py-2 text-left text-xs hover:bg-base-200" data-client-option-edit="{{ client }}">{{ client }}</button>
                {% endfor %}
            </div>
        </div>
        <div class="form-control">
            <label class="label label-text text-xs">Remettant / Commercial</label>
            <input type="text" name="remettant_commercial" class="input input-bordered input-sm w-full" value="{{ operation.remettant or '' }}" autocomplete="off" data-remettant-input-edit>
            <div class="mt-1 hidden max-h-40 overflow-y-auto rounded-lg border border-base-300 bg-base-100 shadow-sm" data-remettant-list-edit>
                {% for remettant in remettant_options %}
                <button type="button" class="block w-full px-3 py-2 text-left text-xs hover:bg-base-200" data-remettant-option-edit="{{ remettant }}">{{ remettant }}</button>
                {% endfor %}
            </div>
        </div>
        <div class="form-control">
            <label class="label label-text text-xs">Montant</label>
            <input type="number" name="montant" step="0.01" class="input input-bordered input-sm w-full" value="{{ operation.montant }}" required>
        </div>
        <div class="form-control">
            <label class="label label-text text-xs">Banque</label>
            <input type="text" name="banque" class="input input-bordered input-sm w-full" value="{{ operation.banque or '' }}" autocomplete="off" data-bank-input-edit>
            <div class="mt-1 hidden max-h-40 overflow-y-auto rounded-lg border border-base-300 bg-base-100 shadow-sm" data-bank-list-edit>
                {% for bank in bank_options %}
                <button type="button" class="block w-full px-3 py-2 text-left text-xs hover:bg-base-200" data-bank-option-edit="{{ bank }}">{{ bank }}</button>
                {% endfor %}
            </div>
        </div>
        <div class="form-control">
            <label class="label label-text text-xs">N° Pièce</label>
            <input type="text" name="numero_piece" class="input input-bordered input-sm w-full" value="{{ operation.numero_piece or '' }}">
        </div>
        <div class="form-control">
            <label class="label label-text text-xs">Entrée (reçu par)</label>
            <input type="text" name="entree" class="input input-bordered input-sm w-full" value="{{ operation.entree or '' }}">
        </div>
        <div class="form-control">
            <label class="label label-text text-xs">Sortie (remis par)</label>
            <input type="text" name="sortie" class="input input-bordered input-sm w-full" value="{{ operation.sortie or '' }}">
        </div>
    </div>
    <div class="form-control">
        <label class="label label-text text-xs">Remarque</label>
        <textarea name="remarque" class="textarea textarea-bordered textarea-sm w-full" rows="2">{{ operation.remarque or '' }}</textarea>
    </div>

    <div class="flex justify-end gap-2 pt-2">
        <button type="button" class="btn btn-ghost btn-sm" onclick="document.getElementById('detail-modal').close()">Annuler</button>
        <button type="submit" class="btn btn-primary btn-sm"><i class="fas fa-save mr-1"></i>Enregistrer</button>
    </div>
</form>

<script>
    (function () {
        function setupSuggestion({ inputSelector, listSelector, optionAttr }) {
            const input = document.querySelector(inputSelector);
            const list = document.querySelector(listSelector);
            if (!input || !list) return;

            const options = Array.from(list.querySelectorAll(`[${optionAttr}]`));

            function filterOptions() {
                const query = input.value.trim().toUpperCase();
                let visible = 0;
                options.forEach((btn) => {
                    const value = (btn.getAttribute(optionAttr) || '').toUpperCase();
                    const show = !query || value.includes(query);
                    btn.classList.toggle('hidden', !show);
                    if (show) visible += 1;
                });
                list.classList.toggle('hidden', visible === 0);
            }

            input.addEventListener('focus', filterOptions);
            input.addEventListener('input', filterOptions);

            options.forEach((btn) => {
                btn.addEventListener('click', () => {
                    input.value = btn.getAttribute(optionAttr) || '';
                    list.classList.add('hidden');
                });
            });

            document.addEventListener('click', (event) => {
                if (!list.contains(event.target) && event.target !== input) {
                    list.classList.add('hidden');
                }
            });
        }

        setupSuggestion({ inputSelector: '[data-bank-input-edit]', listSelector: '[data-bank-list-edit]', optionAttr: 'data-bank-option-edit' });
        setupSuggestion({ inputSelector: '[data-client-input-edit]', listSelector: '[data-client-list-edit]', optionAttr: 'data-client-option-edit' });
        setupSuggestion({ inputSelector: '[data-remettant-input-edit]', listSelector: '[data-remettant-list-edit]', optionAttr: 'data-remettant-option-edit' });

        const typeSelect = document.querySelector('[data-type-operation]');
        const typeChequeSelect = document.querySelector('[data-type-cheque]');
        const dateGeneralWrap = document.querySelector('[data-date-general-wrap]');
        const dateGeneralInput = document.querySelector('[data-date-general]');
        const dateReceptionWrap = document.querySelector('[data-date-reception-wrap]');
        const dateReceptionInput = document.querySelector('[data-date-reception]');
        const dateSortieWrap = document.querySelector('[data-date-sortie-wrap]');
        const dateSortieInput = document.querySelector('[data-date-sortie]');
        const dateEcheanceWrap = document.querySelector('[data-date-echeance-wrap]');
        const dateEcheanceInput = document.querySelector('[data-date-echeance]');

        function applyTypeRules() {
            const selectedType = typeSelect ? typeSelect.value : '';
            const hasType = selectedType !== '';
            const isCheque = selectedType === 'Chèque';
            const isChequeEcheance = isCheque && typeChequeSelect && typeChequeSelect.value === 'À échéance';

            if (typeChequeSelect) {
                typeChequeSelect.disabled = !isCheque;
                if (!isCheque) typeChequeSelect.value = '';
            }

            if (!hasType) {
                dateGeneralWrap.classList.add('hidden');
                dateReceptionWrap.classList.add('hidden');
                dateSortieWrap.classList.add('hidden');
                dateEcheanceWrap.classList.add('hidden');
                dateGeneralInput.required = false;
                dateReceptionInput.required = false;
                dateSortieInput.required = false;
                dateEcheanceInput.required = false;
                return;
            }

            dateGeneralWrap.classList.toggle('hidden', isCheque);
            dateGeneralInput.required = !isCheque;

            dateReceptionWrap.classList.toggle('hidden', !isCheque);
            dateReceptionInput.required = isCheque;

            dateSortieWrap.classList.toggle('hidden', !isCheque);
            dateSortieInput.required = isCheque;

            dateEcheanceWrap.classList.toggle('hidden', !isChequeEcheance);
            dateEcheanceInput.required = isChequeEcheance;
            if (!isChequeEcheance) dateEcheanceInput.value = '';
        }

        if (typeSelect) {
            typeSelect.addEventListener('change', applyTypeRules);
        }
        if (typeChequeSelect) {
            typeChequeSelect.addEventListener('change', applyTypeRules);
        }
        applyTypeRules();
    })();
</script>
