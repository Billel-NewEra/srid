<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">

    <!-- Société -->
    <div class="form-control">
        <label class="label pb-1"><span class="label-text text-xs font-semibold">Société *</span></label>
        <select name="societe" class="select select-bordered select-sm" required>
            <option value="">—</option>
            <option value="SRID">SRID</option>
            <option value="SRID GENETICS">SRID GENETICS</option>
        </select>
    </div>

    <!-- Année -->
    <div class="form-control">
        <label class="label pb-1"><span class="label-text text-xs font-semibold">Année</span></label>
        <input type="number" name="annee" min="2000" max="2099" step="1"
               class="input input-bordered input-sm" placeholder="{{ now().year }}">
    </div>

    <!-- Fournisseur -->
    <div class="form-control">
        <label class="label pb-1"><span class="label-text text-xs font-semibold">Fournisseur</span></label>
        <input type="text" name="fournisseur" class="input input-bordered input-sm"
               placeholder="NOM FOURNISSEUR">
    </div>

    <!-- Produit -->
    <div class="form-control">
        <label class="label pb-1"><span class="label-text text-xs font-semibold">Produit</span></label>
        <input type="text" name="produit" class="input input-bordered input-sm"
               placeholder="Description du produit">
    </div>

    <!-- Emballage / Conditionnement -->
    <div class="form-control">
        <label class="label pb-1"><span class="label-text text-xs font-semibold">Conditionnement</span></label>
        <input type="text" name="emballage" class="input input-bordered input-sm"
               placeholder="Ex: SAC 25KG">
    </div>

    <!-- Quantité -->
    <div class="form-control">
        <label class="label pb-1"><span class="label-text text-xs font-semibold">Quantité</span></label>
        <input type="number" name="quantite" step="any" min="0"
               class="input input-bordered input-sm" placeholder="0">
    </div>

    <!-- TVA -->
    <div class="form-control">
        <label class="label pb-1"><span class="label-text text-xs font-semibold">TVA</span></label>
        <select name="tva" class="select select-bordered select-sm">
            <option value="">—</option>
            <option value="0.09">9%</option>
            <option value="0.19">19%</option>
        </select>
    </div>

    <!-- Montant EUR -->
    <div class="form-control">
        <label class="label pb-1"><span class="label-text text-xs font-semibold">Montant €</span></label>
        <input type="number" name="montant_eur" step="any" min="0"
               class="input input-bordered input-sm" placeholder="0.00">
    </div>

    <!-- Cours -->
    <div class="form-control">
        <label class="label pb-1"><span class="label-text text-xs font-semibold">Cours (€→DA)</span></label>
        <input type="number" name="cours" step="any" min="0"
               class="input input-bordered input-sm" placeholder="145.0000">
    </div>

    <!-- Montant DA (calculé) -->
    <div class="form-control">
        <label class="label pb-1"><span class="label-text text-xs font-semibold">Montant DA <span class="text-xs opacity-50">(calculé)</span></span></label>
        <div class="input input-bordered input-sm flex items-center montant-da-preview opacity-60 font-mono">—</div>
    </div>

    <!-- Date D10 -->
    <div class="form-control">
        <label class="label pb-1"><span class="label-text text-xs font-semibold">Date D10</span></label>
        <input type="date" name="date_d10" class="input input-bordered input-sm">
    </div>

    <!-- Date Arrivée -->
    <div class="form-control">
        <label class="label pb-1"><span class="label-text text-xs font-semibold">Date d'arrivée</span></label>
        <input type="date" name="date_arrivee" class="input input-bordered input-sm">
    </div>

    <!-- Date Facture -->
    <div class="form-control">
        <label class="label pb-1"><span class="label-text text-xs font-semibold">Date facture</span></label>
        <input type="date" name="date_facture" class="input input-bordered input-sm">
    </div>

    <!-- Code paiement -->
    <div class="form-control">
        <label class="label pb-1"><span class="label-text text-xs font-semibold">Mode paiement</span></label>
        <select name="code_paiement" class="select select-bordered select-sm">
            <option value="">—</option>
            <option value="T">T — Transfert Libre</option>
            <option value="CAD">CAD — Documents</option>
            <option value="R">R — Remise documentaire</option>
        </select>
    </div>

    <!-- Nb jours -->
    <div class="form-control">
        <label class="label pb-1"><span class="label-text text-xs font-semibold">Délai (jours)</span></label>
        <input type="number" name="nb_jours" min="0" step="1"
               class="input input-bordered input-sm" placeholder="0">
    </div>

    <!-- Date Échéance -->
    <div class="form-control">
        <label class="label pb-1"><span class="label-text text-xs font-semibold">Date d'échéance</span></label>
        <input type="date" name="date_echeance" class="input input-bordered input-sm">
    </div>

    <!-- Date Paiement -->
    <div class="form-control">
        <label class="label pb-1"><span class="label-text text-xs font-semibold">Date de paiement</span></label>
        <input type="date" name="date_paiement" class="input input-bordered input-sm">
    </div>

    <!-- Date Valeur -->
    <div class="form-control">
        <label class="label pb-1"><span class="label-text text-xs font-semibold">Date valeur</span></label>
        <input type="date" name="date_valeur" class="input input-bordered input-sm">
    </div>

</div>

<!-- Remarque (pleine largeur) -->
<div class="form-control mt-3">
    <label class="label pb-1"><span class="label-text text-xs font-semibold">Remarque</span></label>
    <textarea name="remarque" rows="2"
              class="textarea textarea-bordered text-sm"
              placeholder="Notes complémentaires..."></textarea>
</div>
