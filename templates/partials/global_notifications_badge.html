{% set has_alerts = notifications and notifications.total_alerts > 0 %}
{% set has_overdue = notifications and notifications.overdue_count > 0 %}

<i class="fas fa-bell text-lg {% if has_alerts %}{% if has_overdue %}text-red-400 animate-pulse{% else %}text-orange-400 animate-pulse{% endif %}{% else %}opacity-70{% endif %}"></i>
{% if has_alerts %}
<span class="absolute -top-1 -right-1 w-4 h-4 rounded-full {% if has_overdue %}bg-red-500/40{% else %}bg-orange-500/40{% endif %} animate-ping"></span>
<span class="absolute -top-1 -right-1 badge {% if has_overdue %}badge-error{% else %}badge-warning{% endif %} badge-xs min-w-5 h-5 px-1 text-[10px] leading-none">
    {{ notifications.total_alerts if notifications.total_alerts < 100 else '99+' }}
</span>
{% endif %}
