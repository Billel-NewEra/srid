<!DOCTYPE html>
<html lang="fr" data-theme="luxury">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - SRID COM</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.22/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="min-h-screen bg-base-200 flex items-center justify-center">
    <div class="card w-full max-w-md shadow-2xl bg-base-100 border border-base-300">
        <div class="card-body">
            <div class="text-center mb-6">
                <img src="/static/icon.jpg" alt="SRID COM" class="w-20 h-20 mx-auto mb-4 rounded-xl object-contain">
                <h1 class="text-2xl font-bold">SRID COM</h1>
                <p class="text-sm opacity-60 mt-1">Système de gestion financière</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="alert alert-{{ 'error' if category == 'error' else 'warning' }} mb-4">
                <i class="fas fa-exclamation-circle"></i>
                <span>{{ message }}</span>
            </div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form method="POST" class="space-y-4">
                <div class="form-control">
                    <label class="label"><span class="label-text">Nom d'utilisateur</span></label>
                    <div class="input input-bordered flex items-center gap-2">
                        <i class="fas fa-user opacity-50"></i>
                        <input type="text" name="username" placeholder="Identifiant" class="grow bg-transparent outline-none" required autofocus>
                    </div>
                </div>
                <div class="form-control">
                    <label class="label"><span class="label-text">Mot de passe</span></label>
                    <div class="input input-bordered flex items-center gap-2">
                        <i class="fas fa-lock opacity-50"></i>
                        <input type="password" name="password" placeholder="••••••••" class="grow bg-transparent outline-none" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-full mt-4">
                    <i class="fas fa-sign-in-alt mr-2"></i> Se connecter
                </button>
            </form>
        </div>
    </div>
</body>
</html>
