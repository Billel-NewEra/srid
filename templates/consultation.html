{% extends "base.html" %}
{% block title %}Consultation - SRID COM{% endblock %}

{% block content %}
<div class="fade-in">
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6">
        <h1 class="text-2xl font-bold"><i class="fas fa-search text-primary mr-2"></i>Consultation</h1>
        <a id="export-link" href="{{ url_for('export_excel') }}" class="btn btn-sm btn-outline btn-success mt-2 sm:mt-0">
            <i class="fas fa-file-excel mr-1"></i> Exporter Excel
        </a>
    </div>

    <div id="notifications-panel"
         hx-get="{{ url_for('api_notifications') }}"
         hx-trigger="load"
         hx-swap="innerHTML"
         class="mb-4"></div>

    <div id="rejections-panel"
         hx-get="{{ url_for('api_rejections') }}"
         hx-trigger="load, refreshGlobalAlert from:body"
         hx-swap="innerHTML"
         class="mb-4"></div>

    <!-- Barre de recherche -->
    <div class="card bg-base-100 shadow mb-6">
        <div class="card-body p-4">
            <div class="flex flex-col gap-4">
                <!-- Recherche texte -->
                <div class="form-control">
                    <div class="input-group flex">
                        <span class="bg-primary text-primary-content px-3 flex items-center rounded-l-lg"><i class="fas fa-search"></i></span>
                        <input type="text" id="search-input" name="search"
                               placeholder="Rechercher un client, banque, n° pièce..."
                               class="input input-bordered flex-1"
                               hx-get="{{ url_for('api_operations') }}"
                               hx-trigger="keyup changed delay:300ms"
                               hx-target="#results-table"
                               hx-include="[name='type_operation'],[name='societe'],[name='statut'],[name='date_filter'],[name='date_debut'],[name='date_fin'],[name='type_cheque']">
                    </div>
                </div>

                <!-- Filtres -->
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-6 gap-3">
                    <select name="type_operation" class="select select-bordered select-sm w-full"
                            hx-get="{{ url_for('api_operations') }}"
                            hx-trigger="change"
                            hx-target="#results-table"
                            hx-include="[name='search'],[name='societe'],[name='statut'],[name='date_filter'],[name='date_debut'],[name='date_fin'],[name='type_cheque']"
                            data-type-operation-filter>
                        <option value="">Tous les types</option>
                        <option value="Chèque">Chèque</option>
                        <option value="Virement">Virement</option>
                        <option value="Versement">Versement</option>
                        <option value="Transfer">Transfer</option>
                        <option value="Autre">Autre</option>
                    </select>
                    <select name="societe" class="select select-bordered select-sm w-full"
                            hx-get="{{ url_for('api_operations') }}"
                            hx-trigger="change"
                            hx-target="#results-table"
                            hx-include="[name='search'],[name='type_operation'],[name='statut'],[name='date_filter'],[name='date_debut'],[name='date_fin'],[name='type_cheque']">
                        <option value="">Toutes les sociétés</option>
                        <option value="SRID">SRID</option>
                        <option value="Genetics">Genetics</option>
                    </select>
                    <select name="statut" class="select select-bordered select-sm w-full"
                            hx-get="{{ url_for('api_operations') }}"
                            hx-trigger="change"
                            hx-target="#results-table"
                            hx-include="[name='search'],[name='type_operation'],[name='societe'],[name='date_filter'],[name='date_debut'],[name='date_fin'],[name='type_cheque']">
                        <option value="">Tous les statuts</option>
                        <option value="Encaissé">Encaissé</option>
                        <option value="Rejeté">Rejeté</option>
                        <option value="Échéance">Échéance</option>
                        <option value="En cours">En cours</option>
                        <option value="Arrive à échéance">Arrive à échéance</option>
                        <option value="Échu">Échu</option>
                    </select>
                    <div class="form-control">
                        <label class="label label-text text-xs py-0">Filtrer dates par</label>
                        <select name="date_filter" class="select select-bordered select-sm w-full"
                                hx-get="{{ url_for('api_operations') }}"
                                hx-trigger="change"
                                hx-target="#results-table"
                                hx-include="[name='search'],[name='type_operation'],[name='societe'],[name='statut'],[name='date_debut'],[name='date_fin'],[name='type_cheque']"
                                data-date-filter>
                            <option value="date_operation">Date dép/vir</option>
                            <option value="date_reception">Date réc</option>
                            <option value="date_echeance">Date échéance</option>
                        </select>
                    </div>
                    <div class="form-control">
                        <label class="label label-text text-xs py-0">Du</label>
                        <input type="date" name="date_debut" class="input input-bordered input-sm w-full"
                               hx-get="{{ url_for('api_operations') }}"
                               hx-trigger="change"
                               hx-target="#results-table"
                               hx-include="[name='search'],[name='type_operation'],[name='societe'],[name='statut'],[name='date_filter'],[name='date_fin'],[name='type_cheque']">
                    </div>
                    <div class="form-control">
                        <label class="label label-text text-xs py-0">Au</label>
                        <input type="date" name="date_fin" class="input input-bordered input-sm w-full"
                               hx-get="{{ url_for('api_operations') }}"
                               hx-trigger="change"
                               hx-target="#results-table"
                               hx-include="[name='search'],[name='type_operation'],[name='societe'],[name='statut'],[name='date_filter'],[name='date_debut'],[name='type_cheque']">
                    </div>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3" data-cheque-filters-wrap>
                    <div class="form-control">
                        <label class="label label-text text-xs py-0">Type chèque</label>
                        <input type="hidden" name="type_cheque" value="" data-type-cheque-filter>
                        <div class="flex flex-wrap gap-2 mt-1" data-type-cheque-pills>
                            <button type="button" class="badge badge-outline badge-sm px-3 py-3" data-type-cheque-option="">Tous</button>
                            <button type="button" class="badge badge-outline badge-sm px-3 py-3" data-type-cheque-option="Garantie">Garantie</button>
                            <button type="button" class="badge badge-outline badge-sm px-3 py-3" data-type-cheque-option="À encaisser">À encaisser</button>
                            <button type="button" class="badge badge-outline badge-sm px-3 py-3" data-type-cheque-option="À échéance">À échéance</button>
                        </div>
                        <label class="label"><span class="label-text-alt opacity-70">Disponible quand Type opération = Chèque</span></label>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Tableau des résultats -->
    <div class="card bg-base-100 shadow">
        <div class="card-body p-4">
            <div class="overflow-x-auto" id="results-table"
                 hx-get="{{ url_for('api_operations') }}"
                 hx-trigger="load"
                 hx-swap="innerHTML">
                <div class="flex justify-center py-8">
                    <span class="loading loading-spinner loading-lg text-primary"></span>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal détail -->
    <dialog id="detail-modal" class="modal">
        <div class="modal-box max-w-2xl" id="modal-content">
        </div>
        <form method="dialog" class="modal-backdrop"><button>close</button></form>
    </dialog>

    <dialog id="status-modal" class="modal">
        <div class="modal-box max-w-md">
            <h3 class="font-bold text-lg mb-2"><i class="fas fa-pen-to-square text-warning mr-2"></i>Changer le statut</h3>
            <p class="text-sm opacity-70 mb-4">Sélectionnez un statut puis confirmez.</p>

            <div id="status-options" class="grid grid-cols-2 gap-2 mb-4"></div>

            <div class="modal-action">
                <button type="button" id="status-cancel" class="btn btn-ghost">Annuler</button>
                <button type="button" id="status-confirm" class="btn btn-primary" disabled>Confirmer</button>
            </div>
        </div>
        <form method="dialog" class="modal-backdrop"><button>close</button></form>
    </dialog>
</div>
{% endblock %}

{% block scripts %}
<script>
    // Ouvrir le modal de détail
    document.body.addEventListener('htmx:afterSwap', function(event) {
        if (event.detail.target.id === 'modal-content') {
            document.getElementById('detail-modal').showModal();
        }
    });

    const exportLink = document.getElementById('export-link');
    const statusModal = document.getElementById('status-modal');
    const statusOptions = document.getElementById('status-options');
    const statusConfirm = document.getElementById('status-confirm');
    const statusCancel = document.getElementById('status-cancel');
    const filterSelectors = [
        '[name="search"]',
        '[name="type_operation"]',
        '[name="type_cheque"]',
        '[name="societe"]',
        '[name="statut"]',
        '[name="date_filter"]',
        '[name="date_debut"]',
        '[name="date_fin"]'
    ];

    const statusChoices = [
        { value: 'Encaissé', cls: 'bg-emerald-600 border-emerald-700 text-white' },
        { value: 'Rejeté', cls: 'bg-red-600 border-red-700 text-white' },
        { value: 'Échéance', cls: 'bg-amber-500 border-amber-600 text-white' },
        { value: 'En cours', cls: 'bg-sky-600 border-sky-700 text-white' },
        { value: 'Arrive à échéance', cls: 'bg-orange-500 border-orange-600 text-white' },
        { value: 'Échu', cls: 'bg-violet-600 border-violet-700 text-white' }
    ];

    let selectedStatus = '';
    let selectedPostUrl = '';

    function currentPageFromTable() {
        const pageSource = document.querySelector('#results-table [data-current-page]');
        const page = parseInt(pageSource?.dataset.currentPage || '1', 10);
        return Number.isNaN(page) ? 1 : page;
    }

    function buildQueryParams(extra = {}) {
        const params = new URLSearchParams();
        filterSelectors.forEach((selector) => {
            const field = document.querySelector(selector);
            if (!field) return;
            const value = field.value.trim();
            if (value) params.set(field.name, value);
        });
        Object.entries(extra).forEach(([k, v]) => {
            if (v !== undefined && v !== null && String(v) !== '') {
                params.set(k, String(v));
            }
        });
        return params;
    }

    function refreshResultsTable() {
        const params = buildQueryParams({ page: currentPageFromTable() });
        htmx.ajax('GET', `{{ url_for('api_operations') }}?${params.toString()}`, { target: '#results-table', swap: 'innerHTML' });
    }

    function refreshNotificationsPanel() {
        htmx.ajax('GET', `{{ url_for('api_notifications') }}`, { target: '#notifications-panel', swap: 'innerHTML' });
    }

    function renderStatusOptions(currentStatus) {
        statusOptions.innerHTML = '';
        statusChoices.forEach((item) => {
            if (item.value === currentStatus) {
                return;
            }
            const button = document.createElement('button');
            button.type = 'button';
            button.className = `badge badge-lg justify-center py-4 border ${item.cls} ${item.value === selectedStatus ? 'ring-2 ring-primary' : ''}`;
            button.textContent = item.value;
            button.addEventListener('click', () => {
                selectedStatus = item.value;
                renderStatusOptions(currentStatus);
                statusConfirm.disabled = selectedStatus === currentStatus;
            });
            statusOptions.appendChild(button);
        });
    }

    function updateExportLink() {
        if (!exportLink) return;
        const url = new URL(exportLink.getAttribute('href'), window.location.origin);
        url.search = '';

        const params = buildQueryParams();
        params.forEach((value, key) => url.searchParams.set(key, value));

        exportLink.setAttribute('href', url.pathname + url.search);
    }

    function syncChequeFilters() {
        const typeOperationField = document.querySelector('[name="type_operation"]');
        const typeChequeField = document.querySelector('[name="type_cheque"]');
        const dateFilterField = document.querySelector('[name="date_filter"]');
        const chequeFiltersWrap = document.querySelector('[data-cheque-filters-wrap]');
        const chequePillsWrap = document.querySelector('[data-type-cheque-pills]');
        const typeChequePills = document.querySelectorAll('[data-type-cheque-option]');

        const isCheque = typeOperationField && typeOperationField.value === 'Chèque';
        if (chequeFiltersWrap) chequeFiltersWrap.classList.remove('hidden');
        if (chequePillsWrap) {
            chequePillsWrap.classList.toggle('opacity-50', !isCheque);
        }
        if (typeChequeField && !isCheque) {
            typeChequeField.value = '';
        }

        const isEcheance = isCheque && typeChequeField && typeChequeField.value === 'À échéance';
        if (dateFilterField) {
            const receptionOption = dateFilterField.querySelector('option[value="date_reception"]');
            const echeanceOption = dateFilterField.querySelector('option[value="date_echeance"]');
            if (receptionOption) {
                receptionOption.hidden = !isCheque;
                receptionOption.disabled = !isCheque;
            }
            if (echeanceOption) {
                echeanceOption.hidden = !isEcheance;
                echeanceOption.disabled = !isEcheance;
            }
            if (!isCheque && dateFilterField.value !== 'date_operation') {
                dateFilterField.value = 'date_operation';
            }
            if (isCheque && !isEcheance && dateFilterField.value === 'date_echeance') {
                dateFilterField.value = 'date_operation';
            }
        }

        typeChequePills.forEach((pill) => {
            const isActive = (pill.getAttribute('data-type-cheque-option') || '') === (typeChequeField?.value || '');
            pill.disabled = !isCheque;
            pill.classList.toggle('pointer-events-none', !isCheque);
            pill.classList.toggle('badge-primary', isActive);
            pill.classList.toggle('text-primary-content', isActive);
            pill.classList.toggle('badge-outline', !isActive);
        });
    }

    filterSelectors.forEach((selector) => {
        const field = document.querySelector(selector);
        if (!field) return;
        field.addEventListener('input', updateExportLink);
        field.addEventListener('change', () => {
            syncChequeFilters();
            updateExportLink();
        });
    });

    document.querySelectorAll('[data-type-cheque-option]').forEach((pill) => {
        pill.addEventListener('click', () => {
            const typeChequeField = document.querySelector('[name="type_cheque"]');
            const typeOperationField = document.querySelector('[name="type_operation"]');
            if (!typeChequeField || !typeOperationField || typeOperationField.value !== 'Chèque') return;
            typeChequeField.value = pill.getAttribute('data-type-cheque-option') || '';
            syncChequeFilters();
            updateExportLink();
            refreshResultsTable();
        });
    });

    document.body.addEventListener('click', async (event) => {
        const trigger = event.target.closest('[data-status-edit]');
        if (!trigger) return;

        selectedPostUrl = trigger.getAttribute('data-post-url') || '';
        const currentStatus = trigger.getAttribute('data-current-status') || '';
        selectedStatus = currentStatus;

        renderStatusOptions(currentStatus);
        statusConfirm.disabled = true;
        statusModal.showModal();
    });

    statusCancel.addEventListener('click', () => {
        statusModal.close();
    });

    statusConfirm.addEventListener('click', async () => {
        if (!selectedPostUrl || !selectedStatus) return;
        const response = await fetch(selectedPostUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded;charset=UTF-8' },
            body: new URLSearchParams({ statut: selectedStatus }).toString(),
            credentials: 'same-origin'
        });

        if (response.ok) {
            statusModal.close();
            refreshResultsTable();
            return;
        }

        alert('Erreur lors du changement de statut.');
    });

    syncChequeFilters();
    updateExportLink();

    document.body.addEventListener('htmx:afterSwap', function(event) {
        if (event.detail.target.id === 'results-table') {
            refreshNotificationsPanel();
            htmx.trigger(document.body, 'refreshGlobalAlert');
        }
    });
</script>
{% endblock %}
